<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}" th:with="view='archive'">
<body>
<div th:fragment="content">

    <!-- Page header -->
    <div class="page-header">
        <div>
            <div class="page-title">Archive</div>
        </div>
    </div>

    <!-- Empty state -->
    <div th:if="${#lists.isEmpty(jobs)}" class="empty-queue">
        <i class="bi bi-archive"></i>
        <h5>No archived jobs</h5>
        <p>Completed and cancelled jobs will appear here.</p>
    </div>

    <!-- Cards -->
    <div th:unless="${#lists.isEmpty(jobs)}">
        <th:block th:each="job : ${jobs}">
            <div th:replace="~{fragments/job-card :: card(${job})}"></div>
        </th:block>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="pg-region" aria-label="Archive pagination">
            <div class="stepper" role="group">
                <a class="step-btn" th:classappend="${currentPage == 0} ? ' disabled'"
                   th:href="@{/queue/archive(page=0)}" aria-label="First page">
                    <i class="bi bi-chevron-double-left"></i>
                </a>
                <a class="step-btn" th:classappend="${currentPage == 0} ? ' disabled'"
                   th:href="@{/queue/archive(page=${currentPage - 1})}" aria-label="Previous page">
                    <i class="bi bi-chevron-left"></i>
                </a>
                <span class="step-readout" aria-live="polite">
                    <span th:text="${currentPage + 1}">1</span>
                    <span class="of">/</span>
                    <span class="total" th:text="${totalPages}">1</span>
                </span>
                <a class="step-btn" th:classappend="${currentPage >= totalPages - 1} ? ' disabled'"
                   th:href="@{/queue/archive(page=${currentPage + 1})}" aria-label="Next page">
                    <i class="bi bi-chevron-right"></i>
                </a>
                <a class="step-btn" th:classappend="${currentPage >= totalPages - 1} ? ' disabled'"
                   th:href="@{/queue/archive(page=${totalPages - 1})}" aria-label="Last page">
                    <i class="bi bi-chevron-double-right"></i>
                </a>
            </div>
        </nav>
    </div>

    <!-- Local time formatting (mirrors queue.html) -->
    <script>
        (function () {
            const pad = n => String(n).padStart(2, '0');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            document.querySelectorAll('.job-ts-date-text[data-datetime]').forEach(el => {
                const dt = new Date(el.dataset.datetime);
                if (isNaN(dt.getTime())) return;
                const today = new Date();
                const isToday = dt.getFullYear() === today.getFullYear() &&
                                dt.getMonth() === today.getMonth() &&
                                dt.getDate() === today.getDate();
                el.textContent = isToday ? 'Today' : `${months[dt.getMonth()]} ${dt.getDate()}`;
                el.title = dt.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            });
            document.querySelectorAll('.job-ts-time-text[data-datetime]').forEach(el => {
                const dt = new Date(el.dataset.datetime);
                if (isNaN(dt.getTime())) return;
                el.textContent = `${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
            });
        })();
    </script>

</div>
</body>
</html>
