<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}" th:with="view='queue',activePage='queue',pageTitle='Queue'">
<body>
<div th:fragment="content">

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <div>
            <div class="page-title">Upload Queue</div>
            <div class="page-subtitle" th:if="${driveFolderPath != null}">
                Polling <strong th:text="${driveFolderPath}"></strong>
            </div>
            <div class="page-subtitle" th:if="${youtubeConnected == true and driveFolderPath == null}">
                No Drive folder set — <a th:href="@{/settings}" class="accent-link">configure in Settings</a>
            </div>
            <div class="page-subtitle warning-text" th:if="${youtubeConnected != true}">
                Connect YouTube in Settings to get started
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <!-- Job table (HTMX polling) -->
    <div th:fragment="jobTable" id="job-table"
         th:hx-get="${hasActiveJobs} ? @{/queue/table} : ''"
         th:hx-trigger="${hasActiveJobs} ? 'every 5s' : 'none'"
         hx-swap="outerHTML">

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(jobs)}" class="empty-queue">
            <i class="bi bi-collection-play"></i>
            <h5>Queue is empty</h5>
            <p>Add videos to your Google Drive folder to get started.</p>
        </div>

        <!-- Job cards -->
        <div th:unless="${#lists.isEmpty(jobs)}">

            <!-- Hidden status data for HTMX change detection -->
            <span th:each="job : ${jobs}"
                  class="d-none job-status-data"
                  th:attr="data-job-id=${job.id},data-status=${job.status.name()},data-title=${job.title}"></span>

            <th:block th:each="job : ${jobs}">
                <div th:replace="~{fragments/job-card :: card(${job})}"></div>
            </th:block>
        </div>
    </div>

    <!-- Toast + status-change detection script -->
    <script>
        window.jobStatuses = window.jobStatuses || {};

        function captureStatuses() {
            const s = {};
            document.querySelectorAll('.job-status-data').forEach(el => {
                s[el.dataset.jobId] = { status: el.dataset.status, title: el.dataset.title };
            });
            return s;
        }

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const bgClass = type === 'success' ? 'text-bg-success' : 'text-bg-danger';
            const toastEl = document.createElement('div');
            toastEl.className = 'toast ' + bgClass;
            toastEl.setAttribute('role', 'alert');
            const wrapper = document.createElement('div');
            wrapper.className = 'd-flex';
            const body = document.createElement('div');
            body.className = 'toast-body fw-semibold';
            body.textContent = message;
            const closeBtn = document.createElement('button');
            closeBtn.type = 'button';
            closeBtn.className = 'btn-close btn-close-white me-2 m-auto';
            closeBtn.setAttribute('data-bs-dismiss', 'toast');
            wrapper.appendChild(body);
            wrapper.appendChild(closeBtn);
            toastEl.appendChild(wrapper);
            container.appendChild(toastEl);
            new bootstrap.Toast(toastEl, { delay: 5000 }).show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        }

        function formatTimestamps(root) {
            const scope = root || document;
            const pad = n => String(n).padStart(2, '0');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

            scope.querySelectorAll('.job-ts-date-text[data-datetime]').forEach(el => {
                const dt = new Date(el.dataset.datetime);
                if (isNaN(dt.getTime())) return;
                const today = new Date();
                const isToday = dt.getFullYear() === today.getFullYear() &&
                                dt.getMonth() === today.getMonth() &&
                                dt.getDate() === today.getDate();
                el.textContent = isToday ? 'Today' : `${months[dt.getMonth()]} ${dt.getDate()}`;
                el.title = dt.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
            });

            scope.querySelectorAll('.job-ts-time-text[data-datetime]').forEach(el => {
                const dt = new Date(el.dataset.datetime);
                if (isNaN(dt.getTime())) return;
                el.textContent = `${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
            });
        }

        window.jobStatuses = captureStatuses();
        formatTimestamps();

        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id !== 'job-table') return;
            formatTimestamps();
            const newStatuses = captureStatuses();
            for (const [id, data] of Object.entries(newStatuses)) {
                const old = window.jobStatuses[id];
                if (old && old.status !== data.status) {
                    if (data.status === 'COMPLETED') {
                        showToast(`"${data.title}" uploaded successfully!`, 'success');
                    } else if (data.status === 'FAILED') {
                        showToast(`"${data.title}" upload failed.`, 'error');
                    }
                }
            }
            window.jobStatuses = newStatuses;
        });
    </script>

</div>
</body>
</html>
