<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}" th:with="view='queue',activePage='queue',pageTitle='Queue'">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Upload Queue</h4>
        <!--/* Hosted mode: show Pick from Drive button */-->
        <button th:if="${hostedMode}" type="button" class="btn btn-primary btn-sm" id="pickFromDriveBtn"
                onclick="openPicker()">
            <i class="bi bi-cloud-arrow-up me-1"></i>Pick from Drive
        </button>
        <!--/* Self-hosted mode: show polling status */-->
        <span th:if="${!hostedMode and driveFolderPath}" class="text-muted small">Polling <strong th:text="${driveFolderPath}"></strong></span>
        <span th:if="${!hostedMode and !driveFolderPath}" class="text-muted small">No Drive folder configured — <a th:href="@{/settings}">set one in Settings</a></span>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

    <div th:fragment="jobTable" id="job-table"
         th:hx-get="${hasActiveJobs} ? @{/queue/table} : ''"
         th:hx-trigger="${hasActiveJobs} ? 'every 5s' : 'none'"
         hx-swap="outerHTML">

        <div th:if="${#lists.isEmpty(jobs)}" class="text-muted text-center py-5">
            <span th:if="${hostedMode}">Pick videos from Google Drive to get started.</span>
            <span th:unless="${hostedMode}">No jobs yet. Add videos to your Google Drive folder to get started.</span>
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(jobs)}">
            <span th:each="job : ${jobs}"
                  class="d-none job-status-data"
                  th:attr="data-job-id=${job.id},data-status=${job.status.name()},data-title=${job.title}"></span>
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Size</th>
                        <th>Privacy</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="job : ${jobs}">
                        <td th:text="${job.id}"></td>
                        <td>
                            <span th:text="${job.title}"></span>
                            <small th:if="${job.driveFileName != null}" class="text-muted d-block"
                                   th:text="'Drive: ' + ${job.driveFileName}"></small>
                        </td>
                        <td th:text="${job.fileSizeBytes != null ? #numbers.formatDecimal(job.fileSizeBytes / 1048576.0, 1, 1) + ' MB' : '—'}"></td>
                        <td><span class="badge text-bg-secondary" th:text="${job.privacyStatus}"></span></td>
                        <td>
                            <span class="badge"
                                  th:classappend="${job.status.name() == 'PENDING' ? 'text-bg-warning' :
                                                   job.status.name() == 'UPLOADING' ? 'text-bg-info' :
                                                   job.status.name() == 'COMPLETED' ? 'text-bg-success' :
                                                   job.status.name() == 'FAILED' ? 'text-bg-danger' :
                                                   'text-bg-dark'}"
                                  th:text="${job.status}"></span>
                            <small th:if="${job.errorMessage}" class="d-block text-danger mt-1"
                                   th:text="${job.errorMessage}"></small>
                        </td>
                        <td th:text="${job.createdAt != null ? job.createdAt.toString().substring(0,16).replace('T',' ') : '—'}"></td>
                        <td>
                            <form th:if="${job.status.name() == 'PENDING'}"
                                  th:action="@{/queue/{id}/cancel(id=${job.id})}" method="post"
                                  style="display:inline">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        onclick="return confirm('Cancel this job?')">Cancel</button>
                            </form>
                            <form th:if="${job.status.name() == 'FAILED' or job.status.name() == 'CANCELLED'}"
                                  th:action="@{/queue/{id}/retry(id=${job.id})}" method="post"
                                  style="display:inline">
                                <button type="submit" class="btn btn-outline-warning btn-sm">Retry</button>
                            </form>
                            <a th:if="${job.status.name() == 'COMPLETED' and job.youtubeId != null}"
                               th:href="'https://youtu.be/' + ${job.youtubeId}"
                               target="_blank" class="btn btn-outline-success btn-sm">View</a>
                            <form th:if="${job.status.name() != 'UPLOADING'}"
                                  th:action="@{/queue/{id}/delete(id=${job.id})}" method="post"
                                  style="display:inline">
                                <button type="submit" class="btn btn-outline-secondary btn-sm"
                                        onclick="return confirm('Delete this job?')">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        window.jobStatuses = window.jobStatuses || {};

        function captureStatuses() {
            const statuses = {};
            document.querySelectorAll('.job-status-data').forEach(el => {
                statuses[el.dataset.jobId] = { status: el.dataset.status, title: el.dataset.title };
            });
            return statuses;
        }

        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const bgClass = type === 'success' ? 'text-bg-success' : 'text-bg-danger';
            const html = `<div class="toast ${bgClass}" role="alert">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                            data-bs-dismiss="toast"></button>
                </div>
            </div>`;
            container.insertAdjacentHTML('beforeend', html);
            const toastEl = container.lastElementChild;
            new bootstrap.Toast(toastEl, { delay: 5000 }).show();
            toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
        }

        // Capture initial statuses
        window.jobStatuses = captureStatuses();

        // After each HTMX swap, detect changes and show toasts, re-init sortable
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id !== 'job-table') return;
            const newStatuses = captureStatuses();
            for (const [id, data] of Object.entries(newStatuses)) {
                const old = window.jobStatuses[id];
                if (old && old.status !== data.status) {
                    if (data.status === 'COMPLETED') {
                        showToast(`"${data.title}" uploaded successfully!`, 'success');
                    } else if (data.status === 'FAILED') {
                        showToast(`"${data.title}" upload failed.`, 'error');
                    }
                }
            }
            window.jobStatuses = newStatuses;
        });
    </script>

    <!--/* Google Picker integration — only loaded in hosted mode */-->
    <th:block th:if="${hostedMode}">
    <script src="https://apis.google.com/js/api.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        const PICKER_API_KEY = /*[[${pickerApiKey}]]*/ '';
        const CLIENT_ID = /*[[${clientId}]]*/ '';
        const OAUTH_TOKEN = /*[[${oauthAccessToken}]]*/ '';
        const CSRF_TOKEN = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const CSRF_HEADER = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        let pickerApiLoaded = false;

        function loadPickerApi() {
            return new Promise((resolve, reject) => {
                if (pickerApiLoaded) {
                    resolve();
                    return;
                }
                gapi.load('picker', {
                    callback: () => {
                        pickerApiLoaded = true;
                        resolve();
                    },
                    onerror: () => reject(new Error('Failed to load Google Picker API'))
                });
            });
        }

        async function openPicker() {
            const btn = document.getElementById('pickFromDriveBtn');
            btn.disabled = true;

            try {
                if (!OAUTH_TOKEN) {
                    showToast('Google account not connected. Please connect in Settings first.', 'error');
                    return;
                }

                await loadPickerApi();

                const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
                    .setMimeTypes('video/*')
                    .setMode(google.picker.DocsViewMode.LIST);

                const picker = new google.picker.PickerBuilder()
                    .setAppId(CLIENT_ID.split('-')[0])
                    .setOAuthToken(OAUTH_TOKEN)
                    .setDeveloperKey(PICKER_API_KEY)
                    .addView(view)
                    .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
                    .setTitle('Select videos to upload')
                    .setCallback(pickerCallback)
                    .build();

                picker.setVisible(true);
            } catch (err) {
                console.error('Picker error:', err);
                showToast('Failed to open Google Picker: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function pickerCallback(data) {
            if (data.action === google.picker.Action.PICKED) {
                const fileIds = data.docs.map(doc => doc.id);
                submitDriveFiles(fileIds);
            }
        }

        async function submitDriveFiles(fileIds) {
            const btn = document.getElementById('pickFromDriveBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Adding...';

            try {
                const headers = {
                    'Content-Type': 'application/json'
                };
                headers[CSRF_HEADER] = CSRF_TOKEN;

                const response = await fetch('/queue/from-drive', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ fileIds: fileIds })
                });

                const result = await response.json();

                if (response.ok) {
                    showToast(result.message, result.errors > 0 ? 'error' : 'success');
                    // Reload the page to show new jobs
                    setTimeout(() => window.location.reload(), 500);
                } else {
                    showToast(result.error || 'Failed to add videos.', 'error');
                }
            } catch (err) {
                console.error('Submit error:', err);
                showToast('Failed to add videos to queue.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-cloud-arrow-up me-1"></i>Pick from Drive';
            }
        }
        /*]]>*/
    </script>
    </th:block>

</div>
</body>
</html>
