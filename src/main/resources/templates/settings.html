<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}" th:with="view='settings',activePage='settings',pageTitle='Settings'">
<body>
<div th:fragment="content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card mb-4">
                <div class="card-header"><h5 class="mb-0">YouTube Account</h5></div>
                <div class="card-body">
                    <div th:if="${youtubeConnected}">
                        <p class="text-success mb-2">YouTube account is connected.</p>
                        <form method="post" th:action="@{/settings/oauth/disconnect}" style="display:inline">
                            <button type="submit" class="btn btn-outline-danger btn-sm"
                                    onclick="return confirm('Disconnect YouTube account?')">Disconnect</button>
                        </form>
                    </div>
                    <div th:unless="${youtubeConnected}">
                        <p class="text-muted mb-2">No YouTube account linked.</p>
                        <a th:href="@{/settings/oauth/connect}" class="btn btn-primary btn-sm">Connect YouTube Account</a>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header"><h5 class="mb-0">YouTube Quota</h5></div>
                <div class="card-body">
                    <div th:if="${quotaExhausted}">
                        <p class="text-danger mb-2">Quota exhausted — uploads are paused until the next YouTube quota reset.</p>
                        <form method="post" th:action="@{/settings/quota/reset}" style="display:inline">
                            <button type="submit" class="btn btn-outline-warning btn-sm"
                                    onclick="return confirm('Reset quota status? Only do this if you know YouTube quota has been restored.')">Reset Quota</button>
                        </form>
                    </div>
                    <div th:unless="${quotaExhausted}">
                        <p class="text-success mb-0">Quota available — uploads will proceed normally.</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><h5 class="mb-0">Default Metadata</h5></div>
                <div class="card-body">
                    <form method="post" th:action="@{/settings}">

                        <div class="mb-3">
                            <label for="defaultDescription" class="form-label">Default description</label>
                            <textarea class="form-control" id="defaultDescription" name="defaultDescription"
                                      rows="3" th:text="${defaultDescription}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="defaultTags" class="form-label">Default tags (comma-separated)</label>
                            <input type="text" class="form-control" id="defaultTags" name="defaultTags"
                                   th:value="${defaultTags}">
                        </div>

                        <div class="mb-3">
                            <label for="defaultPrivacy" class="form-label">Default privacy</label>
                            <select class="form-select" id="defaultPrivacy" name="defaultPrivacy">
                                <option value="PRIVATE" th:selected="${defaultPrivacy == 'PRIVATE'}">Private</option>
                                <option value="UNLISTED" th:selected="${defaultPrivacy == 'UNLISTED'}">Unlisted</option>
                                <option value="PUBLIC" th:selected="${defaultPrivacy == 'PUBLIC'}">Public</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="defaultCategory" class="form-label">Default YouTube category ID</label>
                            <input type="text" class="form-control" id="defaultCategory" name="defaultCategory"
                                   th:value="${defaultCategory}" placeholder="e.g. 22 (People & Blogs)">
                        </div>

                        <div class="mb-3" th:if="${youtubeConnected}">
                            <label for="defaultPlaylist" class="form-label">Default playlist</label>
                            <select class="form-select" id="defaultPlaylist" name="defaultPlaylist">
                                <option value="">None</option>
                                <option th:each="pl : ${playlists}"
                                        th:value="${pl.id}"
                                        th:text="${pl.snippet.title}"
                                        th:selected="${pl.id == defaultPlaylist}">
                                </option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-primary">Save Settings</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
