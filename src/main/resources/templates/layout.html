<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' — YT Deferred Uploader' : 'YT Deferred Uploader'}">YT Deferred Uploader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/upload}">YT Deferred Uploader</a>
        <div class="navbar-nav">
            <a class="nav-link" th:href="@{/upload}" th:classappend="${#strings.equals(activePage,'upload')} ? 'active'">Upload</a>
            <a class="nav-link" th:href="@{/queue}" th:classappend="${#strings.equals(activePage,'queue')} ? 'active'">Queue</a>
            <a class="nav-link" th:href="@{/settings}" th:classappend="${#strings.equals(activePage,'settings')} ? 'active'">Settings</a>
        </div>
    </div>
</nav>
<div class="container" th:insert="~{__${view}__ :: content}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
