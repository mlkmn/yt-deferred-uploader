<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' — YT Deferred Uploader' : 'YT Deferred Uploader'}">YT Deferred Uploader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/icon-32.png}">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/img/icon-192.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>

<div th:if="${@appProperties.mode.demoMode}"
     class="alert alert-info text-center mb-0 rounded-0 py-2"
     role="alert"
     style="font-size:13px; font-weight:600; border-left:0; border-right:0; border-top:0;">
    <strong>Demo mode</strong> - all data is mocked. State resets every 30 minutes.
</div>

<nav class="navbar navbar-expand-sm mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/queue}">
            <span class="brand-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
                    <path d="M23.5 6.19a3 3 0 00-2.11-2.12C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.39.57A3 3 0 00.5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3 3 0 002.11 2.12C4.46 20.5 12 20.5 12 20.5s7.54 0 9.39-.57a3 3 0 002.11-2.12C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/>
                </svg>
            </span>
            YT Uploader
        </a>

        <div class="navbar-nav ms-auto flex-row align-items-center gap-2">
            <a class="nav-link" th:href="@{/queue}"
               th:classappend="${#strings.equals(activePage,'queue')} ? ' active'"
               title="Queue">
                <i class="bi bi-collection-play"></i>
                Queue
            </a>
            <a class="nav-link" th:href="@{/queue/archive}"
               th:classappend="${#strings.equals(activePage,'archive')} ? ' active'"
               title="Archive">
                <i class="bi bi-archive"></i>
                Archive
            </a>
            <a class="nav-link" th:href="@{/settings}"
               th:classappend="${#strings.equals(activePage,'settings')} ? ' active'"
               title="Settings">
                <i class="bi bi-gear"></i>
                Settings
            </a>
            <button type="button" class="btn-logout" title="Logout"
                    data-bs-toggle="modal" data-bs-target="#logoutModal">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </div>
</nav>

<div class="container pb-5" th:insert="~{__${view}__ :: content}"></div>

<!-- Logout Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <form th:action="@{/logout}" method="post" class="modal-body text-center py-4">
                <span class="brand-icon mx-auto mb-3 d-flex" style="width:48px;height:48px;border-radius:12px;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white" style="margin:auto">
                        <path d="M23.5 6.19a3 3 0 00-2.11-2.12C19.54 3.5 12 3.5 12 3.5s-7.54 0-9.39.57A3 3 0 00.5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3 3 0 002.11 2.12C4.46 20.5 12 20.5 12 20.5s7.54 0 9.39-.57a3 3 0 002.11-2.12C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/>
                    </svg>
                </span>
                <p class="fw-semibold mb-3" style="font-size:15px">Log out of YT Uploader?</p>
                <div class="d-flex justify-content-center gap-2">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-outline-danger btn-sm">Log out</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
