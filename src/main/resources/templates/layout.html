<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle != null ? pageTitle + ' — YT Deferred Uploader' : 'YT Deferred Uploader'}">YT Deferred Uploader</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/icon-32.png}">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/img/icon-192.png}">
    <link rel="apple-touch-icon" th:href="@{/img/apple-touch-icon.png}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>
<nav class="navbar navbar-expand-sm navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/queue}">
            <img th:src="@{/img/icon-32.png}" alt="" width="24" height="24">
            YT Deferred Uploader
        </a>
        <div class="navbar-nav ms-auto flex-row align-items-center gap-3">
            <a class="nav-link" th:href="@{/queue}" th:classappend="${#strings.equals(activePage,'queue')} ? 'active'"
               title="Queue"><i class="bi bi-collection-play"></i></a>
            <a class="nav-link" th:href="@{/settings}" th:classappend="${#strings.equals(activePage,'settings')} ? 'active'"
               title="Settings"><i class="bi bi-gear"></i></a>
            <button type="button" class="btn btn-outline-light btn-sm" title="Logout"
                    data-bs-toggle="modal" data-bs-target="#logoutModal"><i class="bi bi-box-arrow-right"></i></button>
        </div>
    </div>
</nav>
<div class="container" th:insert="~{__${view}__ :: content}"></div>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content">
            <form th:action="@{/logout}" method="post" class="modal-body text-center py-4">
                <i class="bi bi-box-arrow-right d-block mb-3" style="font-size:2rem"></i>
                <p>Log out of your account?</p>
                <div class="d-flex justify-content-center gap-2 mt-3">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger btn-sm">Log out</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
