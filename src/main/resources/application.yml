app:
  mode: ${APP_MODE:SELF_HOSTED}
  upload-dir: ./uploads
  max-file-size-mb: 500
  youtube:
    client-id: ${YOUTUBE_CLIENT_ID:}
    client-secret: ${YOUTUBE_CLIENT_SECRET:}
    redirect-uri: ${APP_YOUTUBE_REDIRECT_URI:http://localhost:8080/settings/oauth/callback}
    quota-reset-timezone: Europe/Warsaw
  scheduler:
    poll-interval-ms: 30000
    max-retries: 3
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin}
  encryption-key: ${ENCRYPTION_KEY:}
  cleanup:
    enabled: true
    retention-hours: 24
    cron: "0 0 * * * *"
  drive:
    poll-interval-ms: 60000

logging:
  level:
    pl.mlkmn.ytdeferreduploader: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

spring:
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB
  datasource:
    url: jdbc:h2:file:./data/ytdeferreduploader
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
