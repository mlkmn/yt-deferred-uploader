<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="110" fill="#FF0000"/>
  <!-- Play triangle -->
  <polygon points="168,108 168,404 416,256" fill="#ffffff"/>
  <!-- Clock badge - white circle -->
  <circle cx="370" cy="128" r="88" fill="#ffffff"/>
  <!-- Hour hand (10 o'clock position) -->
  <line x1="370" y1="128" x2="370" y2="64" stroke="#FF0000" stroke-width="11" stroke-linecap="round"/>
  <!-- Minute hand (2 o'clock position) -->
  <line x1="370" y1="128" x2="414" y2="144" stroke="#FF0000" stroke-width="8.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="370" cy="128" r="9" fill="#FF0000"/>
</svg>
